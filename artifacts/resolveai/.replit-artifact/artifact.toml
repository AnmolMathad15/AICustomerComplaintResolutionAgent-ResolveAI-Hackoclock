kind = "web"
previewPath = "/"
title = "ResolveAI"
version = "1.0.0"
id = "artifacts/resolveai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23360

[services.development]
run = "pnpm --filter @workspace/resolveai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resolveai", "run", "build" ]
publicDir = "artifacts/resolveai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23360"
BASE_PATH = "/"
